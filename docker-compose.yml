networks:
  shared1:
    external: true

services:
  x_sourcer:
    container_name: x_sourcer
    build: .
    volumes:
      # Mount the local 'app' package into the container's source root
      # Structure becomes: /src/app/main.py
      - ./app:/src/app
    env_file:
      - .env
    networks:
      - shared1
    environment:
      - PYTHONUNBUFFERED=1
    command: python -m app.main
